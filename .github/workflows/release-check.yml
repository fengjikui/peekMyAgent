name: Release Check

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  release-check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: npm run release:check:linux
          - os: macos-latest
            command: npm run release:check:macos
          - os: windows-latest
            command: npm run release:check:windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - run: ${{ matrix.command }}
